name: Mirror Repository

on:
  push:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git
        run: |
          if ! command -v git >/dev/null; then
            echo "git not found"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.MIRROR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
          EOF

      - name: Push mirrors
        run: |
          set -euo pipefail

          targets="
          git@github.com:Fovir-GitHub/grain-128aeadv2-go.git
          ssh://git@codeberg.org/Fovir/grain-128aeadv2-go.git
          "

          for target in $targets; do
            echo "==> Push to $target"

            git push --mirror "$target"
          done

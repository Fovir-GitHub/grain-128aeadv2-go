<!doctype html>
<html>
  <head>
    <title>Grain-128AEADv2</title>
    <script defer type="module" src="/js/main.js"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
  </head>
  <body>
    <main>
      <div id="key-management">
        <h2>Key Management</h2>
        <div>
          <label for="key-management-key-input"
            >Hex Key Input (K<sub>Grain</sub>)</label
          >
          <input id="key-management-key-input" type="text" />
          <button id="key-management-generate-key">Generate Key</button>
        </div>
        <div>
          <h3>Key Wrapping & Storage</h3>
          <div>
            <label for="key-management-password"
              >Password for Wrapping</label
            >
            <input type="password" id="key-management-password" />
          </div>
          <div>
            <label for="key-management-ad">Associated Data (AD)</label>
            <input
              id="key-management-ad"
              type="text"
              placeholder="e.g. CYS1234567"
            />
            <form>
              <fieldset id="key-management-input-mode">
                <legend>Input Mode:</legend>
                <label for="key-management-input-mode-hex"
                  ><input
                    type="radio"
                    id="key-management-input-mode-hex"
                    name="key-management-input-mode"
                    value="hex"
                    checked
                  />HEX</label
                >
                <label for="key-management-input-mode-text"
                  ><input
                    type="radio"
                    id="key-management-input-mode-text"
                    name="key-management-input-mode"
                    value="text"
                  />Text</label
                >
              </fieldset>
            </form>
          </div>
          <div>
            <button id="key-management-wrap-save-key">
              Wrap & Save .key File
            </button>
            <label for="key-management-load-key-file"
              >Load .key File</label
            >
            <input type="file" id="key-management-load-key-file" />
          </div>
        </div>
      </div>
      <div id="nonce-management">
        <h2>Nonce/IV Managemnet (96-bit, V<sub>Grain</sub>)</h2>
        <div>
          <label for="nonce-management-input"
            >Hex Nonce Input (V<sub>Grain</sub>)</label
          >
          <input type="text" id="nonce-management-input" />
          <button id="nonce-management-generate-key">
            Generate IV
          </button>
          <input type="checkbox" id="nonce-management-auto-generate" />
          <label for="nonce-management-auto-generate"
            >Automatically generate unique IV</label
          >
        </div>
      </div>
      <div id="cipher">
        <h2>Encryption & Decryption Workflows</h2>
        <div>
          <label for="cipher-input">Manual Input</label>
          <input type="text" id="cipher-input" />
          <fieldset id="cipher-input-mode">
            <legend>Input Mode:</legend>
            <label for="cipher-input-mode-hex">
              <input
                type="radio"
                id="cipher-input-mode-hex"
                name="cipher-input-mode"
                value="hex"
                checked
              />
              HEX
            </label>
            <label for="cipher-input-mode-text">
              <input
                type="radio"
                id="cipher-input-mode-text"
                name="cipher-input-mode"
                value="text"
              />
              Text
            </label>
          </fieldset>
          <button type="button" id="cipher-encrypt">Encrypt</button>
          <button type="button" id="cipher-decrypt">Decrypt</button>
          <input
            type="file"
            id="cipher-plaintext-file"
            placeholder="test"
          />
        </div>

        <div>
          <label for="cipher-output">Output</label>
          <textarea id="cipher-output" rows="10" readonly></textarea>
          <button type="button" id="cipher-save-enc-file">
            Save .enc File
          </button>
          <label for="cipher-load-enc-file">Load .enc File</label>
          <input type="file" id="cipher-load-enc-file" />
          <label for="cipher-plaintext-output-text"
            >Plaintext Output (Text)</label
          >
          <textarea
            id="cipher-plaintext-output-text"
            rows="10"
            readonly
          ></textarea>
        </div>
        <div>
          <label for="cipher-loaded-lfsr">Loaded LFSR</label>
          <textarea
            type="text"
            id="cipher-loaded-lfsr"
            readonly
          ></textarea>
        </div>
        <div>
          <label for="cipher-loaded-nfsr">Loaded NFSR</label>
          <textarea
            type="text"
            id="cipher-loaded-nfsr"
            readonly
          ></textarea>
        </div>
        <div>
          <label for="cipher-init-lfsr">Init LFSR</label>
          <textarea
            type="text"
            id="cipher-init-lfsr"
            readonly
          ></textarea>
        </div>
        <div>
          <label for="cipher-init-nfsr">Init NFSR</label>
          <textarea
            type="text"
            id="cipher-init-nfsr"
            readonly
          ></textarea>
        </div>
      </div>
    </main>
  </body>
</html>

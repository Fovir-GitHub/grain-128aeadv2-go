name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""

          - goos: linux
            goarch: arm64
            ext: ""

          - goos: windows
            goarch: amd64
            ext: ".exe"

          - goos: windows
            goarch: arm64
            ext: ".exe"

          - goos: darwin
            goarch: amd64
            ext: ""

          - goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p dist

          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          CGO_ENABLED=0 \
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/grain-128aead-v2-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Collect files
        run: |
          mkdir release

          find dist -type f -exec cp {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
